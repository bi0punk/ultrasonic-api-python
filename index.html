<!DOCTYPE html>
<html lang="en">
<head>
    <title>Interfaz de datos de la placa Wemos</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />

    <!-- Bootstrap CSS v5.3.2 -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
        crossorigin="anonymous"
    />
</head>

<body>
    <header>
        <!-- Puedes agregar aquí tu barra de navegación si la tienes -->
    </header>
    <main>
        <h1>Interfaz de datos de la placa Wemos</h1>
        <div id="distance">Esperando datos de distancia...</div>
    </main>
    <footer>
        <!-- Aquí puedes agregar el contenido de tu pie de página si lo tienes -->
    </footer>
    <!-- Bootstrap JavaScript Libraries -->
    <script
        src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"
    ></script>

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
        integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
        crossorigin="anonymous"
    ></script>

    <script>
        function updateDistance() {
            fetch('/get_latest_data')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('distance').innerText = 'Distancia medida: ' + JSON.stringify(data) + ' cm';
                })
                .catch(error => {
                    document.getElementById('distance').innerText = 'Error al obtener datos: ' + error;
                });
        }

        setInterval(updateDistance, 1000);
        updateDistance();
    </script>
</body>
</html>
